{% extends "base.html" %}
{% block title %}Sign Up — ResumeAI{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🚀</div>
            <h1>Create account</h1>
            <p class="sub-text">Start your AI-powered resume journey today</p>
        </div>

        <form method="POST" action="{{ url_for('signup') }}" novalidate>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6">
                <span class="form-hint">Minimum 6 characters</span>
            </div>

            <button type="submit" class="btn-primary btn-full">
                Create Account →
            </button>
        </form>

        <p class="auth-switch">
            Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
