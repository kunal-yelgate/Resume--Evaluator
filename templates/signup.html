{% extends "base.html" %}

{% block content %}
    <div class="auth-container">
        <h2>Create Account</h2>
        <p class="sub-text">Start your journey with us today!</p>
        <form method="POST">
            <!-- Form fields will go here -->
             <input type="email" name="email" placeholder="Enter your Email" required>
             <input type="password" name="password" placeholder="Enter your Password" required>
             <p class="sub-text">The password must be at least 6 characters long.</p>
             <button type="submit">Sign Up</button>

             <p class="sub-text">Already have an account? <a href="/login">Login here</a></p>
        </form>
    </div>
{% endblock %}
