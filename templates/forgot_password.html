{% extends "base.html" %}
{% block title %}Forgot Password — ResumeAI{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🔒</div>
            <h1>Reset Password</h1>
            <p class="sub-text">Enter your email and we'll send reset instructions.</p>
        </div>

        <form method="POST" action="{{ url_for('forgot_password') }}" novalidate>
            <div class="form-group">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
            <button type="submit" class="btn-primary btn-full">
                Send Reset Instructions →
            </button>
        </form>

        <p class="auth-switch">
            Remember your password? <a href="{{ url_for('login') }}">Sign in</a>
        </p>
    </div>
</div>
{% endblock %}
